name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      app_name:
        description: 'اسم التطبيق (بدون مسافات)'
        required: false
        default: 'TimingApp'
      package_name:
        description: 'اسم الحزمة (package name)'
        required: false
        default: 'com.example.timing'
      version:
        description: 'رقم الإصدار (version)'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: تحميل الكود
        uses: actions/checkout@v4

      - name: إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: تثبيت أدوات النظام المطلوبة
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk-headless

      - name: تثبيت مكتبات Python
        run: |
          python -m pip install --upgrade pip
          pip install flet[all]
          pip install -r requirements.txt

      - name: عرض إصدار Flet
        run: |
          flet --version

      - name: بناء الـ APK
        run: |
          PACKAGES=$(cat requirements.txt | tr '\n' ' ')
          flet build apk \
            --name "${{ inputs.app_name }}" \
            --package "${{ inputs.package_name }}" \
            --version "${{ inputs.version }}" \
            --include-packages "$PACKAGES" \
            --no-android-splash \
            --no-web-splash

      - name: رفع الـ APK كـ artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-APK
          path: build/apk/*.apk
