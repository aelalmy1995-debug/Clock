name: Build Flet APK
on:
  push:
    branches:
      - main  # هيشتغل تلقائياً لما ترفع كود على فرع main
  workflow_dispatch: # بيسمح لك تشغل البناء يدوياً من GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flet

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK
        run: |
          # أمر البناء الخاص بـ flet
          # التأكد من وجود مجلد assets عشان الخطوط اللي مستخدمها
          flet build apk --project-name "MyClockApp" --org "com.yourname.clock"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flet-app-apk
          path: build/apk/*.apk
