name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: تحميل الكود
        uses: actions/checkout@v4

      - name: إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: تثبيت أدوات النظام المطلوبة
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk-headless

      - name: تثبيت Flet بالإصدار المناسب
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.84.0
          pip install -r requirements.txt

      - name: بناء الـ APK باستخدام flet pack
        run: |
          flet pack main.py \
            --name "TimingApp" \
            --product-name "TimingApp" \
            --add-packages "$(cat requirements.txt | tr '\n' ' ')" \
            --icon assets/icon.png \
            --onedir

      - name: رفع الملفات الناتجة
        uses: actions/upload-artifact@v4
        with:
          name: App-Files
          path: dist/
