name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: تحميل الكود
        uses: actions/checkout@v4

      - name: إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: تثبيت Flet
        run: |
          pip install --upgrade pip
          pip install flet
          pip install -r requirements.txt

      - name: بناء الـ APK
        run: |
          yes | flet build apk --verbose

      - name: رفع الـ APK
        uses: actions/upload-artifact@v4
        with:
          name: App-APK
          path: build/apk/*.apk
